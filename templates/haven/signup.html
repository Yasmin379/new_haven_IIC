<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join HAVEN - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/haven.css' %}" rel="stylesheet">
</head>
<body>

<div class="signup-split">
  <!-- Left Illustration Panel -->
  <div class="signup-left">
    <div class="signup-illustration">
      <!-- Beautiful illustration image -->
      <img src="https://img.freepik.com/free-vector/happy-students-jumping-celebrating_23-2147934881.jpg" 
           alt="Happy students jumping and celebrating" 
           class="auth-illustration-image">
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="signup-right">
    <div class="signup-form-card">
      <div class="brand-title">HAVEN</div>
      <h1 class="signup-title">Create your account</h1>
      <p class="signup-subtitle">Join your safe, supportive community</p>

      <form method="post" class="auth-form mt-4">
        {% csrf_token %}
        <div class="form-group mb-3">
          <label for="id_username" class="form-label">Username</label>
          <input type="text" name="username" id="id_username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="form-group mb-3">
          <label for="id_email" class="form-label">Email</label>
          <input type="email" name="email" id="id_email" class="form-control" placeholder="Enter your email" required>
        </div>
        <div class="form-group mb-3">
          <label for="id_password1" class="form-label">Password</label>
          <input type="password" name="password1" id="id_password1" class="form-control" placeholder="Create a password" required>
        </div>
        <div class="form-group mb-3">
          <label for="id_password2" class="form-label">Confirm Password</label>
          <input type="password" name="password2" id="id_password2" class="form-control" placeholder="Confirm your password" required>
        </div>
        <div class="form-group mb-3">
          <label for="id_gender" class="form-label">Gender</label>
          <select name="gender" id="id_gender" class="form-control" required>
            <option value="">Select Gender</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="O">Other</option>
          </select>
        </div>
        <div class="form-group mb-4">
          <label for="id_user_role" class="form-label">Account Type</label>
          <select name="user_role" id="id_user_role" class="form-control" required>
            <option value="">Select Account Type</option>
            <option value="user">User - Regular member</option>
            <option value="counselor">Counselor - Mental health professional</option>
            <option value="admin">Admin - System administrator</option>
          </select>
        </div>
        <button type="submit" class="btn-auth-submit w-100">Create Account</button>
      </form>

      <div class="auth-switch mt-3">
        <p>Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
