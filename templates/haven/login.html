<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to HAVEN - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/haven.css' %}" rel="stylesheet">
</head>
<body>

<div class="signup-split">
  <!-- Left Illustration Panel -->
  <div class="signup-left">
    <div class="signup-illustration">
      <!-- Beautiful illustration image -->
      <img src="https://img.freepik.com/free-vector/happy-students-jumping-celebrating_23-2147934881.jpg" 
           alt="Happy students jumping and celebrating" 
           class="auth-illustration-image">
      <div class="welcome-overlay">
        <h2 class="welcome-title">Welcome Back</h2>
        <p class="welcome-subtitle">Continue your wellness journey with HAVEN</p>
      </div>
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="signup-right">
    <div class="signup-form-card">
      <div class="brand-title">HAVEN</div>
      <h1 class="signup-title">Welcome back</h1>
      <p class="signup-subtitle">Sign in to your account</p>

      <form method="post" class="auth-form mt-4">
        {% csrf_token %}
        <div class="form-group mb-3">
          <label for="id_username" class="form-label">Username</label>
          <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required>
        </div>
        <div class="form-group mb-4">
          <label for="id_password" class="form-label">Password</label>
          <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-auth-submit w-100">Sign In</button>
      </form>

      <div class="auth-switch mt-3">
        <p>New to HAVEN? <a href="{% url 'signup' %}">Create Account</a></p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
