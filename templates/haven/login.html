{% load static %}
<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAVEN — Sign In</title>
  <script>
    // Apply theme before paint to avoid flash
    (function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('haven-theme') || 'light'); })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: #F5EFE6;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 15% 15%, #C8D5C9 0%, transparent 50%),
                  radial-gradient(ellipse at 85% 85%, #DDE5DB 0%, transparent 50%),
                  #F5EFE6;
      z-index: 0;
    }
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 480px; height: 480px; background: #C8D5C9; top: -150px; left: -150px; }
    .blob-2 { width: 380px; height: 380px; background: #DDE5DB; bottom: -100px; right: -100px; }

    /* Card */
    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(250, 247, 242, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(232, 217, 197, 0.7);
      border-radius: 28px;
      padding: 3rem 2.75rem 2.5rem;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 48px rgba(47,62,36,0.12), 0 2px 12px rgba(107,125,109,0.06);
      animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #7A8A7D;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: #6B7D6D; }
    .back-link svg { width: 14px; height: 14px; }

    /* Brand */
    .brand {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #7A8F7B;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .brand-dot { width: 5px; height: 5px; background: #6B7D6D; border-radius: 50%; }

    /* Heading */
    .login-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: #2F3E34;
      margin-bottom: 0.3rem;
      line-height: 1.2;
    }
    .login-sub {
      font-size: 0.875rem;
      color: #7A8A7D;
      margin-bottom: 2rem;
    }

    /* Error alert */
    .alert-error {
      background: rgba(180,80,80,0.08);
      border: 1px solid rgba(180,80,80,0.2);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      font-size: 0.85rem;
      color: #7A3A3A;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    /* Field group */
    .field {
      margin-bottom: 1.1rem;
    }
    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7A8A7D;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #A8B5AA;
      pointer-events: none;
    }
    .input-icon svg { width: 16px; height: 16px; }
    .field input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid #E2D9CC;
      border-radius: 12px;
      background: #FAF7F2;
      color: #2F3E34;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: #C0B8AE; }
    .field input:focus {
      border-color: #3D5A3E;
      box-shadow: 0 0 0 3px rgba(61,90,62,0.10);
      background: #fff;
    }
    .toggle-pwd {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #A8B5AA;
      padding: 2px;
      transition: color 0.2s;
    }
    .toggle-pwd:hover { color: #3D5A3E; }
    .toggle-pwd svg { width: 17px; height: 17px; display: block; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #3D5A3E;
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.22s, transform 0.18s, box-shadow 0.22s;
      box-shadow: 0 4px 18px rgba(61,90,62,0.22);
      letter-spacing: 0.02em;
    }
    .btn-submit:hover {
      background: #2E4430;
      transform: translateY(-1px);
      box-shadow: 0 6px 26px rgba(61,90,62,0.28);
    }
    .btn-submit:active { transform: translateY(0); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1.25rem;
      color: #C0B8AE;
      font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E2D9CC;
    }

    /* Switch */
    .switch-text {
      text-align: center;
      font-size: 0.85rem;
      color: #7A8A7D;
    }
    .switch-text a {
      color: #3D5A3E;
      font-weight: 600;
      text-decoration: none;
    }
    .switch-text a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card">

    <!-- Back to landing -->
    <a href="{% url 'home' %}" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back
    </a>

    <!-- Brand -->
    <div class="brand">
      <span class="brand-dot"></span> HAVEN <span class="brand-dot"></span>
    </div>

    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Sign in to continue your journey</p>

    <!-- Error messages -->
    {% if messages %}
      {% for message in messages %}
      <div class="alert-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;margin-top:1px;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ message }}
      </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <!-- Username -->
      <div class="field">
        <label for="id_username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" name="username" id="id_username"
                 placeholder="Your username" required autocomplete="username">
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="id_password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" name="password" id="id_password"
                 placeholder="Your password" required autocomplete="current-password">
          <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Show password">
            <!-- Eye icon -->
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="divider">or</div>

    <p class="switch-text">
      New to HAVEN? <a href="{% url 'signup' %}">Create an account</a>
    </p>

  </div>

  <script>
    const toggleBtn = document.getElementById('togglePwd');
    const pwdInput  = document.getElementById('id_password');
    const eyeIcon   = document.getElementById('eyeIcon');

    const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    toggleBtn.addEventListener('click', function() {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden ? eyeClosed : eyeOpen;
    });

    // Persist dark mode
    (function(){ document.documentElement.setAttribute('data-theme', localStorage.getItem('haven-theme') || 'light'); })();
  </script>
</body>
</html>
